---
layout: default
---

<article class="card" style="margin: 3rem 0; padding: 3rem;">
    <h2 style="margin-top: 0; margin-bottom: 0.5rem;">{{ page.title }}</h2>
    <div class="post-meta">
        📅 {{ page.date | date: "%d. %B %Y" }}
        {% if page.categories %}
            | 🏷️ {{ page.categories | join: ", " }}
        {% endif %}
        {% if page.author %}
            | ✍️ {{ page.author }}
        {% endif %}
    </div>
    
    <div class="content">
        {{ content }}
    </div>
    
    <hr style="border: none; border-top: 1px solid var(--border); margin: 2rem 0;">
    <div style="text-align: center; margin-top: 2rem;">
        <a href="/blog" class="btn">← Zurück zum Blog</a>
    </div>
</article>
